# =============================================================================
# Self-Sovereign Identity — CI pipeline
# Validates: JavaScript/TypeScript (pnpm), Python (FastAPI), Rust (Soroban),
#            Solidity (Foundry), and Circom (ZK circuits).
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  RUST_VERSION: "1.79.0"

jobs:
  # =========================================================================
  # JS/TS — SDK + API Gateway + Frontend + Bridge Relayer + IPFS Service
  # =========================================================================
  js-ts:
    name: JS/TS — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version auto-detected from package.json packageManager field

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint
        continue-on-error: true

  # =========================================================================
  # Solidity — Foundry compilation & tests
  # =========================================================================
  solidity:
    name: Solidity — Forge Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # Dependencies are checked out via git submodules (actions/checkout submodules: recursive)
      - name: Forge Build
        working-directory: packages/contracts-evm
        run: forge build --sizes

      - name: Forge Test
        working-directory: packages/contracts-evm
        run: forge test -vv

  # =========================================================================
  # Rust — Soroban contracts (check compilation, optional tests)
  # =========================================================================
  rust:
    name: Rust — Clippy & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/contracts-stellar/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/contracts-stellar/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        working-directory: packages/contracts-stellar
        run: cargo build --target wasm32-unknown-unknown --release
        continue-on-error: true

      - name: Clippy
        working-directory: packages/contracts-stellar
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: Check formatting
        working-directory: packages/contracts-stellar
        run: cargo fmt --all -- --check
        continue-on-error: true

  # =========================================================================
  # Python — AI Fraud Service tests
  # =========================================================================
  python:
    name: Python — AI Fraud Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/service-ai-fraud
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        working-directory: apps/service-ai-fraud
        run: python -m pytest src/tests -v

  # =========================================================================
  # Prettier — Format check across the whole repo
  # =========================================================================
  formatting:
    name: Formatting — Prettier Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version auto-detected from package.json packageManager field

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format:check
