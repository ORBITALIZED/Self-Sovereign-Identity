# =============================================================================
# Standalone Python test workflow — provides a per-job status badge for the README.
# =============================================================================

name: "CI / Python"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: py-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — AI Fraud Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/service-ai-fraud
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        working-directory: apps/service-ai-fraud
        run: python -m pytest tests/ src/tests/ -v --tb=short
