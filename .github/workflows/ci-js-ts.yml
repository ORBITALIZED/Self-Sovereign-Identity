# =============================================================================
# Standalone JS/TS check — provides a per-job status badge for the README.
# =============================================================================

name: "CI / JS/TS"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: jsts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  js-ts:
    name: JS/TS — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # ── Circom (ZK circuit compiler) ────────────────────────────────────
      - name: Cache Circom binary
        id: cache-circom
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/circom
          key: ${{ runner.os }}-circom-2.1.6

      - name: Install Circom
        if: steps.cache-circom.outputs.cache-hit != 'true'
        run: bash scripts/install-circom.sh 2.1.6

      - name: Add circom to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ── Cache ZK circuit build artifacts ────────────────────────────────
      - name: Cache ZK artifacts
        id: cache-zk
        uses: actions/cache@v4
        with:
          path: |
            packages/zk-circuits/build
            packages/zk-circuits/keys
          key: ${{ runner.os }}-zk-${{ hashFiles('packages/zk-circuits/circuits/**/*.circom', 'packages/zk-circuits/input.json', 'packages/zk-circuits/input-age.json', 'packages/zk-circuits/scripts/compile.sh', 'packages/zk-circuits/scripts/setup.sh', 'packages/zk-circuits/scripts/ci-pretest.sh') }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
