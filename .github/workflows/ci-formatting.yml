# =============================================================================
# Standalone formatting check — provides a per-job status badge for the README.
# (Also gated inside ci.yml; this standalone copy runs in parallel so the
# badge reflects formatting health independently.)
# =============================================================================

name: "CI / Formatting"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: fmt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  formatting:
    name: Formatting — Prettier Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format:check
