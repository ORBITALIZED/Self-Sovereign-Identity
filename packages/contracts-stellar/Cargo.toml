[package]
name = "ssi-contracts-stellar"
version = "0.1.0"
edition = "2021"
authors = ["SSI contributors"]
description = "Self-Sovereign Identity — Soroban smart contracts"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
# NOTE: `cargo test --features testutils` cannot compile due to an upstream
# dependency conflict in `soroban-env-host` (present in 21.x, 22.x, 23.x):
#   - `rand_chacha v0.3.1` provides `CryptoRng` from `rand_core v0.6`
#   - `ed25519-dalek v3.x`  provides `CryptoRng` from `rand_core v0.10`
#   - The trait bound `ChaCha20Rng: CryptoRng` fails because the two traits
#     come from different `rand_core` versions.
#
# The `test` unit tests in `src/test.rs` call `mock_all_auths()` which
# requires the `testutils` feature, so `cargo test` without the feature
# would also fail. To fix this permanently, migrate to soroban-sdk 27.x
# (requires `wasm32v1-none` target, rustc 1.84+, and API changes).
test = false

[features]
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = "=21.7.7"

[dev-dependencies]
soroban-sdk = { version = "=21.7.7", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
lto = true

[profile.test]
opt-level = 0

# -----------------------------------------------------------------------------
# Workspace lint configuration
# -----------------------------------------------------------------------------
# Tighten clippy just enough to catch real issues without breaking the
# existing module surface. New Lints are added sparingly to avoid churn
# in unrelated modules.
[lints.clippy]
correctness = { level = "deny", priority = -1 }
# The `suspicious` group fires on existing code (panic! / expect / unwrap_used);
# the CI `cargo clippy --all-targets -- -D warnings` step would turn those into
# errors. Keep `suspicious` at allow until each offender is cleaned up.
suspicious = "allow"
# Allow-by-default noisy warnings that fire on Soroban SDK boilerplate.
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
