[package]
name = "ssi-contracts-stellar"
version = "0.1.0"
edition = "2021"
authors = ["SSI contributors"]
description = "Self-Sovereign Identity — Soroban smart contracts"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
# =========================================================================
# NOTE: `cargo test --features testutils` is currently broken due to an
# upstream regression in stellar-xdr (as of soroban-sdk 20.0.0). The
# `#[derive(Arbitrary)]` macro in stellar-xdr generates calls to
# `try_size_hint` which is not available in the resolved `arbitrary` crate.
#
# Affected crate: stellar-xdr 20.0.x (transitive dep)
# Symptom: error[E0599]: no method named `try_size_hint` found for struct
#
# When the upstream fix ships (stellar-xdr >= 20.1.0), flip `test = false`
# back to `true` and re-enable the test module in src/test.rs.
# See scripts/check-stellar-xdr-fix.sh for automated detection.
# =========================================================================
test = false

[features]
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = "=20.0.0"

[dev-dependencies]
soroban-sdk = { version = "=20.0.0", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
lto = true

[profile.test]
opt-level = 0
