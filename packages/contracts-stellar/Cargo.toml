[package]
name = "ssi-contracts-stellar"
version = "0.1.0"
edition = "2021"
authors = ["SSI contributors"]
description = "Self-Sovereign Identity — Soroban smart contracts"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = "20.0.0"

[dev-dependencies]
soroban-sdk = { version = "20.0.0", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
lto = "true"

[profile.test]
opt-level = 0
