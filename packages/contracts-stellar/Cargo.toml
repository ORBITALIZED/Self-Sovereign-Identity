[package]
name = "ssi-contracts-stellar"
version = "0.1.0"
edition = "2021"
authors = ["SSI contributors"]
description = "Self-Sovereign Identity — Soroban smart contracts"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
# =========================================================================
# NOTE: `cargo test --features testutils` is currently broken due to an
# upstream regression in stellar-xdr (as of soroban-sdk 20.0.0). The
# `#[derive(Arbitrary)]` macro in stellar-xdr generates calls to
# `try_size_hint` which is not available in the resolved `arbitrary` crate.
#
# Affected crate: stellar-xdr 20.0.x (transitive dep)
# Symptom: error[E0599]: no method named `try_size_hint` found for struct
#
# When the upstream fix ships (stellar-xdr >= 20.1.0), flip `test = false`
# back to `true` and re-enable the test module in src/test.rs.
# See scripts/check-stellar-xdr-fix.sh for automated detection.
# =========================================================================
test = false

[features]
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = "=20.0.0"
# Pin arbitrary to ~1.3.0 to avoid regression in soroban-sdk v20 with
# stellar-xdr's #[derive(Arbitrary)] macro calling try_size_hint
# which was added in arbitrary v1.4.0.
arbitrary = "~1.4.2"

[dev-dependencies]
soroban-sdk = { version = "=20.0.0", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
lto = true

[profile.test]
opt-level = 0

# -----------------------------------------------------------------------------
# Workspace lint configuration
# -----------------------------------------------------------------------------
# Tighten clippy just enough to catch real issues without breaking the
# existing module surface. New Lints are added sparingly to avoid churn
# in unrelated modules.
[lints.clippy]
correctness = { level = "deny", priority = -1 }
# The `suspicious` group fires on existing code (panic! / expect / unwrap_used);
# the CI `cargo clippy --all-targets -- -D warnings` step would turn those into
# errors. Keep `suspicious` at allow until each offender is cleaned up.
suspicious = "allow"
# Allow-by-default noisy warnings that fire on Soroban SDK boilerplate.
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
