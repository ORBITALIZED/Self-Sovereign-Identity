[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
gas_reports = ["*"]

[profile.default.fuzz]
runs = 256
seed = "1337"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[rpc_endpoints]
local = "${EVM_RPC_URL}"
polygon = "https://rpc-amoy.polygon.technology"
ethereum = "https://rpc.sepolia.org"

[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY:-}" }
ethereum = { key = "${ETHERSCAN_API_KEY:-}" }
